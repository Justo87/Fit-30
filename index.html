<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <link rel="manifest" href="manifest.json?v=4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FIT30" />
    <link rel="apple-touch-icon" href="https://api.iconify.design/lucide:dumbbell.png?color=white&bg=f97316&width=512&height=512" />
    <link rel="icon" type="image/png" href="https://api.iconify.design/lucide:dumbbell.png?color=white&bg=f97316&width=512&height=512" />
    <title>FIT30 - 30 Días de Transformación</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px;">
        <div style="font-size: 1.2rem; margin-bottom: 10px;">Cargando FIT30...</div>
        <div id="error-display" style="color: #ff4444; font-size: 0.8rem; max-width: 400px; display: none;"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const display = document.getElementById('error-display');
        if (display) {
          display.style.display = 'block';
          display.innerHTML = 'Error de carga: ' + msg + '<br><small>' + url + ':' + lineNo + '</small>';
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
